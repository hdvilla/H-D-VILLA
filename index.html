<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>H&D Villa · Vũng Tàu</title>
<meta name="description" content="H&D Villa Vũng Tàu — không gian nghỉ dưỡng riêng tư cho gia đình và nhóm bạn, chỉ 150m tới biển." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['Fraunces', 'serif'],
          sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
        },
        colors: {
          ivory: {
            50:  '#fbf6ec',
            100: '#f5eedd',
            200: '#ede3c9',
            300: '#e0d3b0',
          },
          sand:  { 400: '#c9b491', 500: '#a8926b', 600: '#8a764f' },
          sky:   { 300: '#b5c9d4', 400: '#8faebd', 500: '#6d91a4', 600: '#4f7587' },
          terracotta: { 400: '#8faebd', 500: '#6d91a4', 600: '#4f7587' },
          ink: {
            500: '#7d6a57',
            700: '#544537',
            800: '#3a3127',
            900: '#2a231c',
          },
        },
      },
    },
  };
</script>

<style>
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    background: #f5eedd;
    color: #2a231c;
    -webkit-font-smoothing: antialiased;
  }
  .font-display { font-family: 'Fraunces', serif; font-weight: 400; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  .tracking-widest-x { letter-spacing: 0.18em; }

  .hairline        { border-color: rgba(42,35,28,0.12); }
  .hairline-strong { border-color: rgba(42,35,28,0.26); }
  .hairline-light  { border-color: rgba(251,246,236,0.20); }

  .btn-terra {
    background: #4f7587;
    color: #fbf6ec;
    transition: background-color 200ms ease, transform 200ms ease;
  }
  .btn-terra:hover { background: #3d5e6e; }

  .live-dot {
    box-shadow: 0 0 0 0 rgba(109,145,164,0.6);
    animation: pulse-dot 2.4s ease-out infinite;
  }
  @keyframes pulse-dot {
    0%   { box-shadow: 0 0 0 0 rgba(109,145,164,0.55); }
    70%  { box-shadow: 0 0 0 10px rgba(109,145,164,0); }
    100% { box-shadow: 0 0 0 0 rgba(109,145,164,0); }
  }

  .reveal {
    opacity: 0;
    transform: translateY(14px);
    animation: reveal-in 900ms cubic-bezier(.2,.6,.2,1) forwards;
  }
  @keyframes reveal-in {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Subtle paper texture for the gallery section */
  .paper {
    background-image:
      radial-gradient(rgba(42,35,28,0.025) 1px, transparent 1px),
      radial-gradient(rgba(42,35,28,0.018) 1px, transparent 1px);
    background-size: 22px 22px, 38px 38px;
    background-position: 0 0, 11px 11px;
  }

  /* Booking widget date input fix */
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.4);
    cursor: pointer;
  }

  /* Reduce motion */
  @media (prefers-reduced-motion: reduce) {
    .reveal { animation: none; opacity: 1; transform: none; }
    .live-dot { animation: none; }
  }
</style>
</head>
<body class="bg-ivory-50 text-ink-900">
  <div id="root"></div>

  <!-- React + Babel (pinned + integrity) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>

  <!-- App scripts -->
  <script type="text/babel" src="booking.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
